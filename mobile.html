<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<title>RUNNER — one hard level</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #wrap { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* top banner (always atop, clears iOS notch) */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 6px) 12px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.72rem;
    font-weight: bold;
    letter-spacing: 1px;
    color: #000;
    border-bottom: 2px solid #000;
    background: #fff;
    z-index: 10;
    pointer-events: none;
  }
  #hud .right { text-align: right; }
  #bar {
    position: fixed;
    left: 0;
    height: 4px;
    background: #000;
    top: calc(env(safe-area-inset-top) + 30px);
    width: 0;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="dist">0%</div>
    <div class="right" id="deaths">DEATHS 0</div>
  </div>
  <div id="bar"></div>
</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const distEl = document.getElementById('dist');
const deathsEl = document.getElementById('deaths');
const barEl = document.getElementById('bar');

/* ───────── virtual world dimensions (fixed height, physics in these units) ───────── */
const VH = 360;                 // virtual height
let VW = 640;                   // virtual width (recomputed from aspect)
let scale = 1, dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2.5);
  const w = window.innerWidth, h = window.innerHeight;
  scale = h / VH;
  VW = Math.ceil(w / scale);
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);  // 1 unit = 1 virtual px
}
window.addEventListener('resize', resize);
resize();

/* ───────── physics constants (tuned so the level is hard but fair) ───────── */
const GROUND_Y = VH - 52;       // top of the ground
const SPEED = 300;              // auto-run speed (virtual px/s) — fast
const GRAV = 1500;
const JUMP_V = 560;             // impulse for both first and second jump
const ANCHOR = () => VW * 0.30; // player's fixed screen x within the view
const PW = 12, PH = 34;         // skinny player

// Derived reach (for level generation):  single jump ~ SPEED*2*JUMP_V/GRAV
const T1 = 2 * JUMP_V / GRAV;
const SINGLE_REACH = SPEED * T1;            // ~ horizontal distance of one jump
const SINGLE_H = JUMP_V * JUMP_V / (2 * GRAV);

/* ───────── seeded RNG → the level is the SAME every run (a designed level) ───────── */
function mulberry32(a) {
  return function () {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

let solids = [];   // {x,y,w,h} landable from the top; side contact = death
let spikes = [];   // {x,y,w,h} hazard
let cannons = [];  // {x,y,t,period,speed} fire balls leftward
let balls = [];    // live cannonballs {x,y,vx}
let monsters = []; // {kind,baseX,x,y,w,h,...} patrol / charge
let cling = false, clingWall = null;   // wall-jump state
let goalX = 0;

function buildLevel() {
  const rng = mulberry32(0x5EED1234);
  solids = []; spikes = []; cannons = []; monsters = [];
  const GY = GROUND_Y;
  const ground  = (x, w) => solids.push({ x, y: GY, w, h: VH, ground: true });
  const block   = (x, y, w, h) => solids.push({ x, y, w, h });
  const plat    = (x, y, w) => solids.push({ x, y, w, h: 12, plat: true });
  const wall    = (x, y, w, h) => solids.push({ x, y, w, h, wall: true });
  const spike   = (x, w) => spikes.push({ x, y: GY - 16, w, h: 16 });
  const cannon  = (x, y) => cannons.push({ x, y, t: 0, period: 1.7, speed: 165 });
  const walker  = (x, range) => monsters.push({ kind: 'walker', baseX: x, x, range, y: GY - 24, w: 22, h: 24, phase: 0, speed: 1.4 });
  const charger = (x) => monsters.push({ kind: 'charger', baseX: x, x, y: GY - 26, w: 24, h: 26, phase: 0, speed: 150, triggered: false });

  // Reach budget (SPEED 300): single jump ~224px / 104px high, double ~382px.
  // Gaps stay under double reach, blocks under jump height; walls are taller
  // than a normal jump on purpose (you must wall-climb them). Hard but solvable.
  let x = 0;
  ground(x, 820); x += 820;             // generous safe start

  const END = 20000;
  const pad = () => 155 + rng() * 110;  // clean landing/breather ground

  while (x < END) {
    const r = rng();

    if (r < 0.13) {
      // GAP
      const gw = 130 + rng() * 150;     // 130–280
      x += gw;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.24) {
      // SPIKE STRIP
      const sw = 30 + rng() * 55;
      ground(x, sw + 50);
      spike(x + 12, sw);
      x += sw + 50;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.35) {
      // STEP BLOCK — jump ONTO it (side = death)
      const bh = 40 + rng() * 52;       // <= jump height
      const bw = 40 + rng() * 60;
      ground(x, bw + 180);
      block(x + 24, GY - bh, bw, bh);
      x += bw + 180;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.46) {
      // GAP + one-way floating PLATFORM aid
      const gw = 190 + rng() * 85;
      const ph = 70 + rng() * 55;
      const pw = 78 + rng() * 46;
      plat(x + (gw - pw) * (0.4 + rng() * 0.2), GY - ph, pw);
      x += gw;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.62) {
      // WALL — too tall for a normal jump; tap against it to wall-climb over
      const wh = 116 + rng() * 70;      // 116–186 (> 104 jump height)
      const ww = 26 + rng() * 16;
      ground(x, ww + 240);
      wall(x + 64, GY - wh, ww, wh);
      x += ww + 240;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.74) {
      // CANNON — fires balls at you along the ground; jump them
      ground(x, 360);
      cannon(x + 318, GY - 14);
      x += 360;
      const lw = pad(); ground(x, lw); x += lw;

    } else if (r < 0.88) {
      // MONSTER — patrolling walker or charging beast; jump over it
      if (rng() < 0.65) { ground(x, 360); walker(x + 185, 52); x += 360; }
      else              { ground(x, 420); charger(x + 250);     x += 420; }
      const lw = pad(); ground(x, lw); x += lw;

    } else {
      // BREATHER
      const fw = 150 + rng() * 160;
      ground(x, fw);
      if (rng() < 0.25) spike(x + fw * 0.5, 24 + rng() * 22);
      x += fw;
    }
  }
  ground(x, 760);
  goalX = x + 280;
  ground(x + 760, 420);
}
buildLevel();

/* ───────── player + state ───────── */
let state = 'ready';   // ready | run | dead | win
let deaths = 0;
let bestX = 0;

const player = { x: 0, y: 0, vy: 0, jumps: 0, grounded: false };
function reset() {
  player.x = 80;
  player.y = GROUND_Y - PH;
  player.vy = 0;
  player.jumps = 2;
  player.grounded = true;
  bestX = 0;
  cling = false; clingWall = null;
  balls = [];
  for (const c of cannons) c.t = 0;
  for (const m of monsters) { m.phase = 0; m.triggered = false; m.x = m.baseX; }
}
reset();

function jump() {
  if (state === 'ready') { state = 'run'; return; }
  if (state === 'dead' || state === 'win') { reset(); state = 'run'; return; }
  if (cling) { player.vy = -JUMP_V; player.jumps = 1; return; }   // wall kick (climb)
  if (player.jumps > 0) {
    player.vy = -JUMP_V;
    player.jumps--;
    player.grounded = false;
  }
}
function onPress(e) { e.preventDefault(); jump(); }
window.addEventListener('pointerdown', onPress, { passive: false });
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); jump(); }
});

function die() {
  if (state !== 'run') return;
  state = 'dead';
  deaths++;
  deathsEl.textContent = 'DEATHS ' + deaths;
}

/* ───────── physics step (fixed sub-steps to avoid tunnelling) ───────── */
function step(dt) {
  if (state !== 'run') return;

  if (!cling) player.x += SPEED * dt;                 // pinned while wall-clinging

  if (cling) {                                        // slow slide down the wall
    player.vy += GRAV * 0.4 * dt;
    if (player.vy > 130) player.vy = 130;
  } else {
    player.vy += GRAV * dt;
  }
  player.y += player.vy * dt;

  const prevBottom = player.y + PH - player.vy * dt;  // approx previous bottom
  player.grounded = false;

  let px = player.x, pr = player.x + PW;
  let newCling = false, newWall = null;
  for (const s of solids) {
    if (pr <= s.x || px >= s.x + s.w) continue;
    if (player.y + PH <= s.y - 0.5 || player.y >= s.y + s.h) continue;
    if (player.vy >= 0 && prevBottom <= s.y + 6) {
      // land on top
      player.y = s.y - PH;
      player.vy = 0;
      player.grounded = true;
      player.jumps = 2;
    } else if (s.plat) {
      continue;          // one-way platform: pass through from below / the side
    } else if (s.wall) {
      newCling = true; newWall = s;   // cling to the wall instead of dying
    } else {
      die();             // wall side / underside / pit edge
      return;
    }
  }
  if (newCling) {
    player.x = newWall.x - PW + 1;    // pin to the wall face (slight overlap holds the cling)
    cling = true; clingWall = newWall;
    if (player.jumps < 1) player.jumps = 1;
    px = player.x; pr = player.x + PW;
  } else {
    cling = false; clingWall = null;
  }

  // cannons fire while the player is on the approach side
  for (const c of cannons) {
    if (player.x > c.x - VW * 1.05 && player.x < c.x) {
      c.t += dt;
      if (c.t >= c.period) { c.t -= c.period; balls.push({ x: c.x - 6, y: c.y, vx: -c.speed }); }
    }
  }
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    b.x += b.vx * dt;
    if (b.x < player.x - VW) { balls.splice(i, 1); continue; }
    if (pr > b.x - 7 && px < b.x + 7 && player.y + PH > b.y - 7 && player.y < b.y + 7) { die(); return; }
  }

  // monsters
  for (const m of monsters) {
    if (m.kind === 'walker') {
      m.phase += dt;
      m.x = m.baseX + Math.sin(m.phase * m.speed) * m.range;
    } else {                                  // charger: waits, then rushes left
      if (!m.triggered && player.x > m.baseX - VW * 0.9) m.triggered = true;
      if (m.triggered) m.x -= m.speed * dt;
    }
    if (pr > m.x && px < m.x + m.w && player.y + PH > m.y && player.y < m.y + m.h) { die(); return; }
  }

  // spikes
  for (const s of spikes) {
    if (pr <= s.x || px >= s.x + s.w) continue;
    if (player.y + PH <= s.y || player.y >= s.y + s.h) continue;
    die();
    return;
  }

  if (player.y > VH + 60) { die(); return; }   // fell into a pit

  if (player.x > bestX) bestX = player.x;
  if (player.x >= goalX) state = 'win';
}

/* ───────── render ───────── */
let legPhase = 0;
function drawPlayer(sx) {
  const topY = player.y;
  ctx.fillStyle = '#000';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const cx = sx + PW / 2;
  const headR = 5.5;
  // head
  ctx.beginPath(); ctx.arc(cx, topY + headR, headR, 0, Math.PI * 2); ctx.fill();
  // torso
  const neck = topY + headR * 2;
  const hip = topY + PH - 12;
  ctx.beginPath(); ctx.moveTo(cx, neck); ctx.lineTo(cx, hip); ctx.stroke();
  if (player.grounded && state === 'run') {
    legPhase += 0.35;
    const a = Math.sin(legPhase) * 7;
    const b = Math.sin(legPhase + Math.PI) * 7;
    // legs
    ctx.beginPath(); ctx.moveTo(cx, hip); ctx.lineTo(cx + a, topY + PH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, hip); ctx.lineTo(cx + b, topY + PH); ctx.stroke();
    // arms
    ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(cx, neck + 4); ctx.lineTo(cx - b * 0.7, neck + 12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, neck + 4); ctx.lineTo(cx + a * 0.7, neck + 12); ctx.stroke();
  } else {
    // tucked jump pose
    ctx.beginPath(); ctx.moveTo(cx, hip); ctx.lineTo(cx - 6, topY + PH - 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, hip); ctx.lineTo(cx + 6, topY + PH - 4); ctx.stroke();
    ctx.lineWidth = 2.4;
    ctx.beginPath(); ctx.moveTo(cx, neck + 4); ctx.lineTo(cx + 9, neck + 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, neck + 4); ctx.lineTo(cx - 7, neck + 9); ctx.stroke();
  }
}

function render() {
  const camX = player.x - ANCHOR();
  ctx.clearRect(0, 0, VW, VH);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, VW, VH);

  // parallax speed ticks (light gray) for motion feel
  ctx.fillStyle = '#e2e2e2';
  const tickGap = 70;
  const off = (camX * 0.5) % tickGap;
  for (let gx = -off; gx < VW; gx += tickGap) {
    ctx.fillRect(gx, 40, 2, VH - 40);
  }

  // solids
  ctx.fillStyle = '#000';
  for (const s of solids) {
    const sx = s.x - camX;
    if (sx > VW || sx + s.w < 0) continue;
    if (s.ground) {
      ctx.fillRect(sx, s.y, s.w, 6);                 // ground top line
      ctx.fillStyle = '#000';
      ctx.fillRect(sx, s.y + 6, s.w, VH - s.y);       // fill below
      // hatch
      ctx.fillStyle = '#fff';
      for (let hx = sx - ((camX) % 16); hx < sx + s.w; hx += 16) {
        if (hx < sx) continue;
        ctx.fillRect(hx, s.y + 10, 1, VH - s.y);
      }
      ctx.fillStyle = '#000';
    } else if (s.plat) {
      ctx.fillRect(sx, s.y, s.w, s.h);
    } else if (s.wall) {
      ctx.fillStyle = '#000'; ctx.fillRect(sx, s.y, s.w, s.h);   // climbable wall
      ctx.fillStyle = '#fff';
      for (let ry = s.y + 6; ry < s.y + s.h - 3; ry += 10) ctx.fillRect(sx + 2, ry, s.w - 4, 2);
      ctx.fillStyle = '#000';
    } else {
      ctx.fillRect(sx, s.y, s.w, s.h);               // block
    }
  }

  // spikes (triangles)
  ctx.fillStyle = '#000';
  for (const s of spikes) {
    const sx = s.x - camX;
    if (sx > VW || sx + s.w < 0) continue;
    const teeth = Math.max(1, Math.round(s.w / 12));
    const tw = s.w / teeth;
    for (let i = 0; i < teeth; i++) {
      const tx = sx + i * tw;
      ctx.beginPath();
      ctx.moveTo(tx, s.y + s.h);
      ctx.lineTo(tx + tw / 2, s.y);
      ctx.lineTo(tx + tw, s.y + s.h);
      ctx.closePath();
      ctx.fill();
    }
  }

  // cannons
  ctx.fillStyle = '#000';
  for (const c of cannons) {
    const sx = c.x - camX;
    if (sx < -40 || sx > VW + 40) continue;
    ctx.fillRect(sx - 6, c.y + 8, 22, GROUND_Y - (c.y + 8));   // pillar
    ctx.fillRect(sx - 22, c.y - 8, 26, 18);                    // barrel (aims left)
    ctx.beginPath(); ctx.arc(sx + 5, c.y + 1, 13, 0, Math.PI * 2); ctx.fill();
  }

  // cannonballs
  for (const b of balls) {
    const sx = b.x - camX;
    if (sx < -20 || sx > VW + 20) continue;
    ctx.beginPath(); ctx.arc(sx, b.y, 7, 0, Math.PI * 2); ctx.fill();
  }

  // monsters
  for (const m of monsters) {
    const sx = m.x - camX;
    if (sx < -50 || sx > VW + 50) continue;
    ctx.fillStyle = '#000';
    ctx.fillRect(sx, m.y, m.w, m.h);                                  // body
    ctx.beginPath();                                                  // spiky top
    ctx.moveTo(sx, m.y); ctx.lineTo(sx + m.w * 0.5, m.y - 9); ctx.lineTo(sx + m.w, m.y);
    ctx.closePath(); ctx.fill();
    ctx.fillRect(sx + 3, m.y + m.h, 4, 4);                            // feet
    ctx.fillRect(sx + m.w - 7, m.y + m.h, 4, 4);
    ctx.fillStyle = '#fff'; ctx.fillRect(sx + m.w - 9, m.y + 6, 4, 4); // eye
    ctx.fillStyle = '#000';
  }

  // goal flag
  const gx = goalX - camX;
  if (gx < VW + 40 && gx > -40) {
    ctx.fillStyle = '#000';
    ctx.fillRect(gx, GROUND_Y - 90, 4, 90);
    ctx.beginPath();
    ctx.moveTo(gx + 4, GROUND_Y - 90);
    ctx.lineTo(gx + 34, GROUND_Y - 78);
    ctx.lineTo(gx + 4, GROUND_Y - 66);
    ctx.closePath();
    ctx.fill();
  }

  drawPlayer(ANCHOR());

  // overlays
  if (state === 'ready') centerText('TAP TO RUN', 'auto-run · tap = jump · tap again = double jump');
  else if (state === 'dead') centerText('YOU DIED', 'tap to retry from the start');
  else if (state === 'win') centerText('LEVEL COMPLETE', deaths + ' death' + (deaths === 1 ? '' : 's') + ' · tap to run again');

  // HUD progress
  const pct = Math.max(0, Math.min(100, Math.round((player.x / goalX) * 100)));
  distEl.textContent = pct + '%';
  barEl.style.width = pct + '%';
}

function centerText(big, small) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  ctx.fillRect(0, VH * 0.30, VW, VH * 0.34);
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px ui-monospace, monospace';
  ctx.fillText(big, VW / 2, VH * 0.46);
  ctx.font = 'bold 12px ui-monospace, monospace';
  ctx.fillText(small, VW / 2, VH * 0.54);
  ctx.restore();
}

/* ───────── loop (fixed-step physics) ───────── */
let last = performance.now();
let acc = 0;
const STEP = 1 / 240;
function frame(now) {
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.1) dt = 0.1;           // clamp after tab switches
  acc += dt;
  while (acc >= STEP) { step(STEP); acc -= STEP; }
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
